<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#09090b"/>
      <stop offset="100%" stop-color="#18181b"/>
    </linearGradient>
    <!-- Subtle grid pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#27272a" stroke-width="0.5" opacity="0.4"/>
    </pattern>
    <!-- Glow for the canary -->
    <radialGradient id="canaryGlow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#D93F45" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#D93F45" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1280" height="640" fill="url(#bg)"/>
  <rect width="1280" height="640" fill="url(#grid)"/>

  <!-- Subtle top border accent -->
  <rect width="1280" height="2" fill="#D93F45" opacity="0.6"/>

  <!-- Canary glow -->
  <circle cx="280" cy="320" r="200" fill="url(#canaryGlow)"/>

  <!-- Canary mascot (scaled from favicon, centered at 280, 300) -->
  <g transform="translate(280, 300) scale(3.2)" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- Offset to center the bird which is drawn around cx=32 -->
    <g transform="translate(-32, -34)">
      <!-- Crest feathers -->
      <g fill="#D93F45" stroke="#8A171E" stroke-width="2.6">
        <circle cx="25" cy="16" r="5.5"/>
        <circle cx="32" cy="12.5" r="6"/>
        <circle cx="39" cy="16" r="5.5"/>
        <!-- Wings -->
        <ellipse cx="21.5" cy="34" rx="6.5" ry="10.5" transform="rotate(-18 21.5 34)" fill="#B82931"/>
        <ellipse cx="42.5" cy="34" rx="6.5" ry="10.5" transform="rotate(18 42.5 34)" fill="#B82931"/>
        <!-- Body -->
        <ellipse cx="32" cy="34" rx="16.5" ry="18.5"/>
      </g>
      <!-- Belly highlights -->
      <ellipse cx="27.5" cy="26.5" rx="4.6" ry="6.2" fill="#FFB0AE" opacity=".2"/>
      <ellipse cx="32" cy="39.5" rx="11.5" ry="12.5" fill="#FF8E8B" opacity=".24"/>
      <!-- Cheeks -->
      <circle cx="23.2" cy="35.5" r="2" fill="#FFB8B2" opacity=".7"/>
      <circle cx="40.8" cy="35.5" r="2" fill="#FFB8B2" opacity=".7"/>
      <!-- Beak -->
      <path d="M32 30.5 27.8 33.9 32 37.1 36.2 33.9Z" fill="#F39A31" stroke="#8A171E" stroke-width="2"/>
      <!-- Eyes -->
      <circle cx="27.2" cy="28.6" r="2.8" fill="#2C2412"/>
      <circle cx="36.8" cy="28.6" r="2.8" fill="#2C2412"/>
      <!-- Eye highlights -->
      <circle cx="26.4" cy="27.7" r="0.9" fill="#FFF8E2"/>
      <circle cx="36" cy="27.7" r="0.9" fill="#FFF8E2"/>
      <!-- Feet -->
      <path d="M26 53.5v3.5m0 0-2 2m2-2 2 2m10-5.5v3.5m0 0-2 2m2-2 2 2" stroke="#DB8B2B" stroke-width="2.4"/>
    </g>
  </g>

  <!-- Text content -->
  <g>
    <!-- Project name -->
    <text x="500" y="250" font-family="'Manrope', 'Inter', system-ui, -apple-system, sans-serif" font-size="72" font-weight="800" fill="#fafafa" letter-spacing="-2">canonry</text>

    <!-- Tagline -->
    <text x="500" y="310" font-family="'Manrope', 'Inter', system-ui, -apple-system, sans-serif" font-size="26" font-weight="400" fill="#a1a1aa">Track how AI answer engines cite your domain</text>

    <!-- Provider pills -->
    <g transform="translate(500, 350)">
      <!-- Gemini -->
      <rect x="0" y="0" width="100" height="36" rx="18" fill="#27272a" stroke="#3f3f46" stroke-width="1"/>
      <text x="50" y="23" font-family="'Manrope', 'Inter', system-ui, -apple-system, sans-serif" font-size="14" font-weight="500" fill="#a1a1aa" text-anchor="middle">Gemini</text>

      <!-- OpenAI -->
      <rect x="112" y="0" width="100" height="36" rx="18" fill="#27272a" stroke="#3f3f46" stroke-width="1"/>
      <text x="162" y="23" font-family="'Manrope', 'Inter', system-ui, -apple-system, sans-serif" font-size="14" font-weight="500" fill="#a1a1aa" text-anchor="middle">OpenAI</text>

      <!-- Claude -->
      <rect x="224" y="0" width="100" height="36" rx="18" fill="#27272a" stroke="#3f3f46" stroke-width="1"/>
      <text x="274" y="23" font-family="'Manrope', 'Inter', system-ui, -apple-system, sans-serif" font-size="14" font-weight="500" fill="#a1a1aa" text-anchor="middle">Claude</text>

      <!-- Perplexity -->
      <rect x="336" y="0" width="120" height="36" rx="18" fill="#27272a" stroke="#3f3f46" stroke-width="1"/>
      <text x="396" y="23" font-family="'Manrope', 'Inter', system-ui, -apple-system, sans-serif" font-size="14" font-weight="500" fill="#a1a1aa" text-anchor="middle">Perplexity</text>
    </g>

    <!-- Open source badge -->
    <g transform="translate(500, 420)">
      <rect x="0" y="0" width="160" height="36" rx="18" fill="none" stroke="#10b981" stroke-width="1.5" opacity="0.7"/>
      <circle cx="22" cy="18" r="4" fill="#10b981" opacity="0.8"/>
      <text x="88" y="23" font-family="'Manrope', 'Inter', system-ui, -apple-system, sans-serif" font-size="14" font-weight="600" fill="#10b981" text-anchor="middle" opacity="0.9">Open Source</text>
    </g>

    <!-- CLI command hint -->
    <g transform="translate(500, 480)">
      <rect x="0" y="0" width="340" height="40" rx="8" fill="#18181b" stroke="#27272a" stroke-width="1.5"/>
      <text x="16" y="26" font-family="'SF Mono', 'Fira Code', 'JetBrains Mono', monospace" font-size="15" fill="#71717a">$</text>
      <text x="32" y="26" font-family="'SF Mono', 'Fira Code', 'JetBrains Mono', monospace" font-size="15" fill="#d4d4d8">npx @ainyc/canonry init</text>
    </g>
  </g>

  <!-- Bottom border accent -->
  <rect y="638" width="1280" height="2" fill="#D93F45" opacity="0.3"/>
</svg>
