name: CI

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/ci.yml'
      - '.dockerignore'
      - 'Dockerfile'
      - 'docker/**'
      - 'apps/**'
      - 'packages/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - 'tsconfig.base.json'
      - 'eslint.config.js'
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/ci.yml'
      - '.dockerignore'
      - 'Dockerfile'
      - 'docker/**'
      - 'apps/**'
      - 'packages/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - 'tsconfig.base.json'
      - 'eslint.config.js'

jobs:
  validate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.28.2
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run typecheck
      - run: pnpm run test
      - run: pnpm run lint
      - run: pnpm -r run build
        name: Build all packages (catches missing deps, bundler errors)

  docker-build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      # Use the runner's bundled buildx/docker driver so CI doesn't have to pull
      # an extra BuildKit image from Docker Hub before the actual image build.
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          load: true
          tags: canonry:ci

      - name: Smoke test container
        shell: bash
        run: |
          docker run -d --rm --name canonry-ci -p 4100:4100 -e CANONRY_API_KEY=test canonry:ci

          for attempt in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:4100/health >/dev/null; then
              exit 0
            fi
            sleep 2
          done

          docker logs canonry-ci
          exit 1

      - name: Cleanup smoke container
        if: always()
        run: docker rm -f canonry-ci || true
